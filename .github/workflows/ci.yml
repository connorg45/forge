name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go test ./... -race -count=1 -cover
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - run: docker build -f deploy/Dockerfile .
      - run: docker build -f deploy/Dockerfile.web --build-arg VITE_API_URL=http://localhost:8080 .
