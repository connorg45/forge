services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - forge-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    entrypoint: ["/bin/forge-api"]
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
      DATABASE_URL: postgres://forge:forge@postgres:5432/forge?sslmode=disable
      REDIS_ADDR: redis:6379
      OTLP_ENDPOINT: tempo:4317
      QUEUES: default
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tempo:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    entrypoint: ["/bin/forge-worker"]
    environment:
      DATABASE_URL: postgres://forge:forge@postgres:5432/forge?sslmode=disable
      REDIS_ADDR: redis:6379
      OTLP_ENDPOINT: tempo:4317
      QUEUES: default
      CONCURRENCY: 8
      LEASE_DURATION: 5s
      JOB_TIMEOUT: 30s
      SHUTDOWN_GRACE: 20s
    deploy:
      replicas: 2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    entrypoint: ["/bin/forge-scheduler"]
    environment:
      DATABASE_URL: postgres://forge:forge@postgres:5432/forge?sslmode=disable
      REDIS_ADDR: redis:6379
      OTLP_ENDPOINT: tempo:4317
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.55.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo.yml:/etc/tempo.yml:ro
    ports:
      - "3200:3200"
      - "4317:4317"

volumes:
  forge-postgres:
