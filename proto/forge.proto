syntax = "proto3";

package forge.v1;

option go_package = "github.com/connor/forge/proto/forgepb";

import "google/protobuf/struct.proto";

service Forge {
  rpc SubmitJob(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc GetJob(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc CancelJob(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc GetQueueStats(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc ListDLQ(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc RequeueDLQ(google.protobuf.Struct) returns (google.protobuf.Struct);
}
